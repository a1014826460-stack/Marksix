<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no"
    />
    <title>全网最准尽在台湾六合彩论坛</title>
    <style>
      body {
        margin: 0;
        background: #ffffff;
        font-family: "Microsoft YaHei", sans-serif;
      }

      .legacy-embed-loading,
      .legacy-embed-error {
        box-sizing: border-box;
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 16px;
        color: #333333;
        line-height: 1.6;
      }

      .legacy-embed-error {
        color: #a40000;
      }
    </style>
    <script>
      (function () {
        const LEGACY_SITE_ROOT = "/vendor/shengshi8800";
        const FIXED_PAGE_TITLE = "全网最准尽在台湾六合彩论坛";
        const FIXED_FORUM_TITLE = "台湾六合彩论坛";
        const FIXED_FORUM_SHORT = "台湾论坛";
        const FIXED_DATA_SITE = "台湾资料网";

        const params = new URLSearchParams(window.location.search);
        const legacyType = Number(params.get("type") || params.get("t") || "3");
        const legacyWeb = Number(params.get("web") || "4");

        let pendingScrollPosition = null;
        let isReloadingLegacyPage = false;

        window.__LEGACY_EMBED_CONFIG__ = {
          type: Number.isFinite(legacyType) ? legacyType : 3,
          web: Number.isFinite(legacyWeb) ? legacyWeb : 4,
          debug: params.get("debug") === "1",
          pageSwitch: params.get("page_switch") === "1",
          shellHeader: params.get("shell_header") === "1",
        };

        function updateLegacyConfigType(nextType) {
          const numericType = Number(nextType);
          window.__LEGACY_EMBED_CONFIG__.type = Number.isFinite(numericType)
            ? numericType
            : 3;
        }

        function getCanonicalUrlForType(type) {
          const nextUrl = new URL(window.location.href);
          nextUrl.pathname = "/";
          nextUrl.searchParams.set("t", String(type));
          nextUrl.searchParams.delete("type");
          nextUrl.searchParams.delete("web");
          nextUrl.searchParams.delete("page_switch");
          nextUrl.searchParams.delete("shell_header");
          return nextUrl.toString();
        }

        function resolveGameByType(type) {
          if (Number(type) === 2) return "macau";
          if (Number(type) === 1) return "hongkong";
          return "taiwan";
        }

        function resolveTypeByGame(game) {
          if (game === "macau") return 2;
          if (game === "hongkong") return 1;
          return 3;
        }

        function getDynamicBoardBranding(type) {
          if (Number(type) === 2) {
            return {
              forumTitle: "澳门六合彩论坛",
              forumName: "澳门六合彩",
              dataSite: "澳门资料网",
              shortColor: "澳门彩",
              shortName: "澳门",
              slogan: "AAA级大公开;准确率绝对100%",
            };
          }

          if (Number(type) === 1) {
            return {
              forumTitle: "香港六合彩论坛",
              forumName: "香港六合彩",
              dataSite: "香港资料网",
              shortColor: "香港彩",
              shortName: "香港",
              slogan: "【单车变宝马】 借钱拿高利贷也要大胆下注! ",
            };
          }

          return {
            forumTitle: "台湾六合彩论坛",
            forumName: "台湾六合彩",
            dataSite: "台湾资料网",
            shortColor: "台湾彩",
            shortName: "台湾",
            slogan: "勇敢向钱钱钱飞!",
          };
        }

        function replaceBoardTitleText(text, branding) {
          return String(text == null ? "" : text)
            .replace(/台湾六合彩论坛/g, branding.forumTitle)
            .replace(/台湾六合彩/g, branding.forumName)
            .replace(/台湾资料网/g, branding.dataSite)
            .replace(/台湾彩/g, branding.shortColor)
            .replace(/勇敢向钱钱钱飞!/g, branding.slogan)
            .replace(/台湾/g, branding.shortName);
        }

        function rememberScrollPosition() {
          const anchorIds = ["nav2", "7x1m", "4x8m", "gsb", "gsb3", "msks", "9x1m", "yqjt", "6x", "3t", "lx"];
          let anchorId = "";
          let anchorDelta = 0;
          let smallestDistance = Number.POSITIVE_INFINITY;

          for (const id of anchorIds) {
            const element = document.getElementById(id);
            if (!element) continue;
            const rect = element.getBoundingClientRect();
            const distance = Math.abs(rect.top);
            if (distance < smallestDistance) {
              smallestDistance = distance;
              anchorId = id;
              anchorDelta = rect.top;
            }
          }

          pendingScrollPosition = {
            x: window.scrollX || window.pageXOffset || 0,
            y: window.scrollY || window.pageYOffset || 0,
            anchorId,
            anchorDelta,
          };
        }

        function restoreScrollPosition() {
          if (!pendingScrollPosition) return;
          const nextPosition = pendingScrollPosition;
          pendingScrollPosition = null;
          const rootStyle = document.documentElement?.style;
          const previousScrollBehavior = rootStyle?.scrollBehavior ?? "";

          const restore = () => {
            if (nextPosition.anchorId) {
              const anchor = document.getElementById(nextPosition.anchorId);
              if (anchor) {
                const top =
                  anchor.getBoundingClientRect().top +
                  (window.scrollY || window.pageYOffset || 0) -
                  nextPosition.anchorDelta;
                window.scrollTo(nextPosition.x, Math.max(0, top));
                return;
              }
            }

            window.scrollTo(nextPosition.x, nextPosition.y);
          };

          if (rootStyle) {
            rootStyle.scrollBehavior = "auto";
          }

          window.requestAnimationFrame(() => {
            restore();
            window.requestAnimationFrame(restore);
            window.setTimeout(restore, 60);
            window.setTimeout(restore, 120);
            window.setTimeout(restore, 240);
            window.setTimeout(() => {
              if (rootStyle) {
                rootStyle.scrollBehavior = previousScrollBehavior;
              }
            }, 260);
          });
        }

        function enforceStaticBrandText() {
          const forumTitleNodes = document.querySelectorAll(
            '[data-legacy-brand-static="forum-title"]'
          );
          for (const node of forumTitleNodes) {
            node.textContent = FIXED_FORUM_TITLE;
          }

          const forumShortNodes = document.querySelectorAll(
            '[data-legacy-brand-static="forum-short"]'
          );
          for (const node of forumShortNodes) {
            node.textContent = FIXED_FORUM_SHORT;
          }

          const dataSiteNodes = document.querySelectorAll(
            '[data-legacy-brand-static="data-site"]'
          );
          for (const node of dataSiteNodes) {
            node.textContent = FIXED_DATA_SITE;
          }

          document.title = FIXED_PAGE_TITLE;
        }

        function applyDynamicBoardTitles() {
          const branding = getDynamicBoardBranding(window.__LEGACY_EMBED_CONFIG__.type);
          const selector = [
            ".list-title",
            ".haoju",
            ".copyright",
            ".ymgg",
            ".ymgg p",
            ".qxtable td",
            ".qxtable th",
            ".ptyx11 th",
            ".ptyx11 td",
            ".bzlx td",
            ".foot-img p",
          ].join(", ");

          const nodes = document.querySelectorAll(selector);
          for (const node of nodes) {
            if (node.closest("[data-legacy-brand-static]")) continue;
            if (node.closest(".KJ-TabBox")) continue;
            if (node.closest(".djck")) continue;
            if (node.closest("#nav2")) continue;

            const walker = document.createTreeWalker(node, NodeFilter.SHOW_TEXT);
            const textNodes = [];
            let current;
            while ((current = walker.nextNode())) {
              textNodes.push(current);
            }

            if (!textNodes.length && node.childNodes.length === 1 && node.childNodes[0].nodeType === Node.TEXT_NODE) {
              node.textContent = replaceBoardTitleText(node.textContent, branding);
              continue;
            }

            for (const textNode of textNodes) {
              if (!textNode.parentElement) continue;
              if (textNode.parentElement.closest("[data-legacy-brand-static]")) continue;
              if (textNode.parentElement.closest(".KJ-TabBox")) continue;
              if (textNode.parentElement.closest(".djck")) continue;
              if (textNode.parentElement.closest("#nav2")) continue;
              textNode.nodeValue = replaceBoardTitleText(textNode.nodeValue, branding);
            }
          }
        }

        function applyShellHeaderPatch(html) {
          if (!window.__LEGACY_EMBED_CONFIG__.shellHeader) return html;
          return html.replace(
            /(<\/head>)/i,
            "<style>body > .box.news-box, body > .box.pad#yxym, #fhdb, #nav2{display:none!important}</style>$1"
          );
        }

        function patchLegacyHtml(html) {
          let patched = String(html == null ? "" : html);

          if (!/<base\s/i.test(patched)) {
            patched = patched.replace(
              /(<head[^>]*>)/i,
              `$1<base href="${LEGACY_SITE_ROOT}/">`
            );
          }

          patched = patched.replace(
            /var\s+type\s*=\s*3/,
            "var type = window.__LEGACY_EMBED_CONFIG__?.type || 3"
          );
          patched = patched.replace(
            /var\s+web\s*=\s*4/,
            "var web = window.__LEGACY_EMBED_CONFIG__?.web || 4"
          );
          patched = patched.replace(
            /<title>[\s\S]*?<\/title>/i,
            `<title>${FIXED_PAGE_TITLE}</title>`
          );
          patched = patched.replace(
            /<a[^>]*data-legacy-brand-static="forum-title"[^>]*>\s*<b[^>]*data-legacy-brand-static="forum-title"[^>]*>[\s\S]*?<\/b>\s*<\/a>/i,
            '<a data-legacy-brand-static="forum-title"><b data-legacy-brand-static="forum-title">台湾六合彩论坛</b></a>'
          );
          patched = patched.replace(
            /<h2([^>]*data-legacy-brand-static="forum-short"[^>]*)>[\s\S]*?<\/h2>/i,
            '<h2$1>台湾论坛</h2>'
          );
          patched = patched.replace(
            /<h2([^>]*data-legacy-brand-static="data-site"[^>]*)>[\s\S]*?<\/h2>/i,
            '<h2$1>台湾资料网</h2>'
          );
          patched = applyShellHeaderPatch(patched);
          patched = patched.replace(/<\/body>/i, buildBridgeScript() + "</body>");

          return patched;
        }

        function buildBridgeScript() {
          return `<script>
            (function(){
              var lastHeight = 0;

              function resolveGameByType(type){
                if(Number(type) === 2) return 'macau';
                if(Number(type) === 1) return 'hongkong';
                return 'taiwan';
              }

              function resolveTypeByGame(game){
                if(game === 'macau') return 2;
                if(game === 'hongkong') return 1;
                return 3;
              }

              function resolveGameByTab(tab){
                if(!tab || !tab.getAttribute) return '';
                var dataOpt = tab.getAttribute('data-opt') || '';
                var match = dataOpt.match(/lottery_type=(\\d+)/);
                return resolveGameByType(match ? Number(match[1]) : 3);
              }

              function hideShellHeader(){
                if(!(window.__LEGACY_EMBED_CONFIG__ && window.__LEGACY_EMBED_CONFIG__.shellHeader)) return;
                var firstNewsBox = document.querySelector('body > .box.news-box');
                var backTop = document.getElementById('fhdb');
                var firstHero = document.querySelector('body > .box.pad#yxym');
                var nav = document.getElementById('nav2');
                if(firstNewsBox) firstNewsBox.style.display = 'none';
                if(backTop) backTop.style.display = 'none';
                if(firstHero) firstHero.style.display = 'none';
                if(nav) nav.style.display = 'none';
              }

              function postAnchorMap(){
                var anchorIds = ['7x1m', '4x8m', 'gsb', 'gsb3', 'msks', '9x1m', 'yqjt', '6x', '3t', 'lx'];
                var anchors = {};
                for(var i = 0; i < anchorIds.length; i++){
                  var id = anchorIds[i];
                  var el = document.getElementById(id);
                  if(!el) continue;
                  var rect = el.getBoundingClientRect();
                  anchors[id] = Math.max(0, Math.round(rect.top + (window.pageYOffset || 0)));
                }
                if(window.parent && window.parent !== window){
                  window.parent.postMessage({
                    kind: 'legacy-anchor-map',
                    anchors: anchors,
                    href: window.location.href
                  }, '*');
                }
              }

              function getHeight(){
                var body = document.body;
                var html = document.documentElement;
                var scrollTop = window.pageYOffset || (html ? html.scrollTop : 0) || (body ? body.scrollTop : 0) || 0;
                var maxBottom = 0;

                if(body && body.children){
                  for(var i = 0; i < body.children.length; i++){
                    var child = body.children[i];
                    if(!child) continue;
                    var childStyle = window.getComputedStyle ? window.getComputedStyle(child) : null;
                    if(childStyle && childStyle.position === 'fixed') continue;
                    var rect = child.getBoundingClientRect();
                    var bottom = rect.bottom + scrollTop;
                    if(bottom > maxBottom) maxBottom = bottom;
                  }
                }

                return Math.max(0, Math.ceil(maxBottom));
              }

              function postHeight(){
                var height = getHeight();
                if(!height) return;
                if(Math.abs(height - lastHeight) < 2) return;
                lastHeight = height;
                if(window.parent && window.parent !== window){
                  window.parent.postMessage({
                    kind: 'legacy-embed-height',
                    height: height,
                    type: window.__LEGACY_EMBED_CONFIG__ ? window.__LEGACY_EMBED_CONFIG__.type : 3,
                    href: window.location.href
                  }, '*');
                }
              }

              function syncLotteryTabs(){
                var desiredGame = resolveGameByType(window.__LEGACY_EMBED_CONFIG__ ? window.__LEGACY_EMBED_CONFIG__.type : 3);
                var container = document.querySelector('.KJ-TabBox');
                if(!container) return false;
                var tabs = Array.prototype.slice.call(container.querySelectorAll('ul > li'));
                var target = null;

                for(var i = 0; i < tabs.length; i++){
                  var game = resolveGameByTab(tabs[i]);
                  tabs[i].setAttribute('data-legacy-game', game);
                  if(game === desiredGame) target = tabs[i];
                }

                if(!target) return false;
                if(!target.classList.contains('cur') && typeof target.click === 'function'){
                  target.click();
                }
                return true;
              }

              function applyTopLevelGameChange(game){
                var host = window.__LEGACY_EMBED_HOST__;
                if(!host) return;
                var nextType = resolveTypeByGame(game);
                var nextUrl = host.getCanonicalUrlForType(nextType);

                window.__LEGACY_LAST_GAME_CHANGE__ = game;
                window.__LEGACY_LAST_GAME_CHANGE_URL__ = nextUrl;

                if(window.parent && window.parent !== window){
                  window.parent.postMessage({
                    kind: 'legacy-embed-game-change',
                    game: game,
                    href: window.location.href,
                    nextUrl: nextUrl
                  }, '*');
                  return;
                }

                if(nextUrl === window.location.href) return;
                host.rememberScrollPosition();
                host.updateLegacyConfigType(nextType);
                host.setIsReloadingLegacyPage(true);

                if(window.history && typeof window.history.replaceState === 'function'){
                  window.history.replaceState(null, '', nextUrl);
                }

                host.loadLegacyPage().finally(function(){
                  host.setIsReloadingLegacyPage(false);
                  host.restoreScrollPosition();
                });
              }

              function bindLotteryTabSwitch(){
                var host = window.__LEGACY_EMBED_HOST__;
                if(host && host.getIsReloadingLegacyPage()) return;
                var container = document.querySelector('.KJ-TabBox');
                if(!container || container.__legacySwitchBound) return;
                container.__legacySwitchBound = true;

                container.addEventListener('click', function(event){
                  var allowPageSwitch = !!(window.__LEGACY_EMBED_CONFIG__ && window.__LEGACY_EMBED_CONFIG__.pageSwitch);
                  var isTopLevel = !window.parent || window.parent === window;
                  if(!(allowPageSwitch || isTopLevel)) return;
                  if(event && event.isTrusted === false) return;
                  var target = event.target && event.target.closest ? event.target.closest('li') : null;
                  if(!target || !container.contains(target)) return;
                  var game = target.getAttribute('data-legacy-game') || resolveGameByTab(target);
                  if(game){
                    window.setTimeout(function(){
                      applyTopLevelGameChange(game);
                    }, 0);
                  }
                }, true);
              }

              function refreshBridgeState(){
                if(window.__LEGACY_EMBED_HOST__){
                  window.__LEGACY_EMBED_HOST__.enforceStaticBrandText();
                  window.__LEGACY_EMBED_HOST__.applyDynamicBoardTitles();
                }
                hideShellHeader();
                bindLotteryTabSwitch();
                syncLotteryTabs();
                postHeight();
                postAnchorMap();
                if(window.__LEGACY_EMBED_HOST__ && window.__LEGACY_EMBED_HOST__.restoreScrollPosition){
                  window.__LEGACY_EMBED_HOST__.restoreScrollPosition();
                }
              }

              window.addEventListener('load', function(){
                refreshBridgeState();
                setTimeout(refreshBridgeState, 80);
                setTimeout(refreshBridgeState, 300);
                setTimeout(refreshBridgeState, 1200);
              });

              window.addEventListener('resize', function(){
                postHeight();
                postAnchorMap();
              });

              if(window.ResizeObserver){
                var resizeObserver = new ResizeObserver(postHeight);
                resizeObserver.observe(document.documentElement);
              }

              if(window.MutationObserver && document.body){
                var mutationObserver = new MutationObserver(function(){
                  window.requestAnimationFrame(refreshBridgeState);
                });
                mutationObserver.observe(document.body, {
                  childList: true,
                  subtree: true,
                  attributes: true,
                  characterData: true
                });
              }
            })();
          <\/script>`;
        }

        async function loadLegacyPage() {
          try {
            const response = await fetch(`${LEGACY_SITE_ROOT}/index.html`, {
              cache: "no-store",
            });
            if (!response.ok) {
              throw new Error("无法读取旧站 index.html");
            }

            const source = await response.text();
            const patched = patchLegacyHtml(source);

            document.open();
            document.write(patched);
            document.close();
            enforceStaticBrandText();
            applyDynamicBoardTitles();
            restoreScrollPosition();
          } catch (error) {
            const detail = error instanceof Error ? error.message : String(error);
            document.body.innerHTML =
              '<div class="legacy-embed-error">旧站嵌入页加载失败：' +
              detail +
              "</div>";
          }
        }

        window.__LEGACY_EMBED_HOST__ = {
          rememberScrollPosition,
          restoreScrollPosition,
          updateLegacyConfigType,
          loadLegacyPage: () => loadLegacyPage(),
          getIsReloadingLegacyPage: () => isReloadingLegacyPage,
          setIsReloadingLegacyPage: (nextValue) => {
            isReloadingLegacyPage = !!nextValue;
          },
          getCanonicalUrlForType: (type) => getCanonicalUrlForType(type),
          enforceStaticBrandText,
          applyDynamicBoardTitles,
        };

        window.addEventListener("DOMContentLoaded", loadLegacyPage);
      })();
    </script>
  </head>
  <body>
    <div class="legacy-embed-loading">正在加载，请稍候...</div>
  </body>
</html>
