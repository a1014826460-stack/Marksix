<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no"
    />
    <title>旧站隔离嵌入页</title>
    <style>
      body {
        margin: 0;
        background: #ffffff;
        font-family: "Microsoft YaHei", sans-serif;
      }

      .legacy-embed-loading,
      .legacy-embed-error {
        box-sizing: border-box;
        max-width: 720px;
        margin: 0 auto;
        padding: 24px 16px;
        color: #333333;
        line-height: 1.6;
      }

      .legacy-embed-error {
        color: #a40000;
      }
    </style>
    <script>
      (function () {
        /**
         * 这里不直接把旧 JS 注入 React，而是让旧站在独立文档里完整运行。
         * 这样可以保留：
         * 1. 旧站原生 document.write / jQuery 逻辑
         * 2. 旧站原有的黄色高亮规则
         * 3. 旧站对特码命中、生肖命中的原始判断细节
         */
        const params = new URLSearchParams(window.location.search);
        const legacyType = Number(params.get("type") || "3");
        const legacyWeb = Number(params.get("web") || "4");

        window.__LEGACY_EMBED_CONFIG__ = {
          type: Number.isFinite(legacyType) ? legacyType : 3,
          web: Number.isFinite(legacyWeb) ? legacyWeb : 4,
          debug: params.get("debug") === "1",
          pageSwitch: params.get("page_switch") === "1",
          shellHeader: params.get("shell_header") === "1",
        };

        function getBrandingByType(type) {
          if (type === 2) {
            return {
              forumTitle: "\u6fb3\u95e8\u516d\u5408\u5f69\u8bba\u575b",
              dataSite: "\u6fb3\u95e8\u8d44\u6599\u7f51",
              shortForum: "\u6fb3\u95e8\u8bba\u575b",
            };
          }

          if (type === 1) {
            return {
              forumTitle: "\u9999\u6e2f\u516d\u5408\u5f69\u8bba\u575b",
              dataSite: "\u9999\u6e2f\u8d44\u6599\u7f51",
              shortForum: "\u9999\u6e2f\u8bba\u575b",
            };
          }

          return {
            forumTitle: "\u53f0\u6e7e\u516d\u5408\u5f69\u8bba\u575b",
            dataSite: "\u53f0\u6e7e\u8d44\u6599\u7f51",
            shortForum: "\u53f0\u6e7e\u8bba\u575b",
          };
        }

        function replaceLegacyBranding(input, branding) {
          return String(input == null ? "" : input)
            .replace(/\u53f0\u6e7e\u516d\u5408\u5f69\u8bba\u575b/g, branding.forumTitle)
            .replace(/\u53f0\u6e7e\u8d44\u6599\u7f51/g, branding.dataSite)
            .replace(/\u53f0\u6e7e\u8bba\u575b/g, branding.shortForum);
        }

        function buildBridgeScript() {
          return [
            "<script>",
            "(function(){",
            "  var lastHeight = 0;",
            "  var debugLines = [];",
            "  function ensureDebugPanel(){",
            "    if(!(window.__LEGACY_EMBED_CONFIG__ && window.__LEGACY_EMBED_CONFIG__.debug)) return null;",
            "    var panel = document.getElementById('legacy-debug-panel');",
            "    if(panel) return panel;",
            "    panel = document.createElement('div');",
            "    panel.id = 'legacy-debug-panel';",
            "    panel.style.position = 'fixed';",
            "    panel.style.right = '8px';",
            "    panel.style.bottom = '8px';",
            "    panel.style.zIndex = '999999';",
            "    panel.style.width = '420px';",
            "    panel.style.maxWidth = 'calc(100vw - 16px)';",
            "    panel.style.maxHeight = '42vh';",
            "    panel.style.overflow = 'auto';",
            "    panel.style.background = 'rgba(17,17,17,0.92)';",
            "    panel.style.color = '#9ef59e';",
            "    panel.style.border = '1px solid rgba(158,245,158,0.45)';",
            "    panel.style.borderRadius = '6px';",
            "    panel.style.padding = '8px 10px';",
            "    panel.style.font = '12px/1.5 Consolas, monospace';",
            "    panel.style.boxShadow = '0 8px 20px rgba(0,0,0,0.28)';",
            "    document.body.appendChild(panel);",
            "    return panel;",
            "  }",
            "  function renderDebugPanel(){",
            "    var panel = ensureDebugPanel();",
            "    if(!panel) return;",
            "    panel.innerHTML = '<div style=\"margin-bottom:4px;color:#fff;\">iframe debug</div>' + debugLines.map(function(line){ return '<div>' + line.replace(/[&<>]/g, function(char){ return ({'&':'&amp;','<':'&lt;','>':'&gt;'})[char]; }) + '</div>'; }).join('');",
            "  }",
            "  function appendDebug(message){",
            "    if(!(window.__LEGACY_EMBED_CONFIG__ && window.__LEGACY_EMBED_CONFIG__.debug)) return;",
            "    var timestamp = new Date().toLocaleTimeString('zh-CN', { hour12: false });",
            "    debugLines.unshift(timestamp + ' ' + message);",
            "    if(debugLines.length > 40) debugLines.length = 40;",
            "    renderDebugPanel();",
            "  }",
            "  function sendDebug(message){",
            "    if(!(window.__LEGACY_EMBED_CONFIG__ && window.__LEGACY_EMBED_CONFIG__.debug)) return;",
            "    appendDebug(message);",
            "    if(window.parent && window.parent !== window){",
            "      window.parent.postMessage({",
            '        kind: "legacy-debug-log",',
            "        message: message,",
            '      }, "*");',
            "    }",
            "  }",
            "  function postGameChange(game){",
            "    if(!game) return;",
            "    sendDebug('postGameChange -> ' + game);",
            "    if(window.parent && window.parent !== window){",
            "      window.parent.postMessage({",
            '        kind: "legacy-embed-game-change",',
            "        game: game,",
            "        href: window.location.href",
            '      }, "*");',
            "    }",
            "  }",
            "  function getBranding(){",
            "    var type = window.__LEGACY_EMBED_CONFIG__ ? window.__LEGACY_EMBED_CONFIG__.type : 3;",
            "    if(type === 2) return { forumTitle: '\\u6fb3\\u95e8\\u516d\\u5408\\u5f69\\u8bba\\u575b', dataSite: '\\u6fb3\\u95e8\\u8d44\\u6599\\u7f51', shortForum: '\\u6fb3\\u95e8\\u8bba\\u575b' };",
            "    if(type === 1) return { forumTitle: '\\u9999\\u6e2f\\u516d\\u5408\\u5f69\\u8bba\\u575b', dataSite: '\\u9999\\u6e2f\\u8d44\\u6599\\u7f51', shortForum: '\\u9999\\u6e2f\\u8bba\\u575b' };",
            "    return { forumTitle: '\\u53f0\\u6e7e\\u516d\\u5408\\u5f69\\u8bba\\u575b', dataSite: '\\u53f0\\u6e7e\\u8d44\\u6599\\u7f51', shortForum: '\\u53f0\\u6e7e\\u8bba\\u575b' };",
            "  }",
            "  function replaceBrandingText(value){",
            "    var branding = getBranding();",
            "    var text = String(value == null ? '' : value);",
            "    return text",
            "      .replace(/\\u53f0\\u6e7e\\u516d\\u5408\\u5f69\\u8bba\\u575b/g, branding.forumTitle)",
            "      .replace(/\\u53f0\\u6e7e\\u8d44\\u6599\\u7f51/g, branding.dataSite)",
            "      .replace(/\\u53f0\\u6e7e\\u8bba\\u575b/g, branding.shortForum);",
            "  }",
            "  function applyBrandingToNode(root){",
            "    if(!root) return;",
            "    if(root.nodeType === Node.TEXT_NODE){",
            "      var replaced = replaceBrandingText(root.nodeValue || '');",
            "      if(replaced !== root.nodeValue) root.nodeValue = replaced;",
            "      return;",
            "    }",
            "    if(root.nodeType !== Node.ELEMENT_NODE && root.nodeType !== Node.DOCUMENT_NODE) return;",
            "    var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);",
            "    var textNode;",
            "    while((textNode = walker.nextNode())){",
            "      var nextValue = replaceBrandingText(textNode.nodeValue || '');",
            "      if(nextValue !== textNode.nodeValue) textNode.nodeValue = nextValue;",
            "    }",
            "    if(root.querySelectorAll){",
            "      var nodes = root.querySelectorAll('[title],[alt],[aria-label]');",
            "      for(var i = 0; i < nodes.length; i++){",
            "        var element = nodes[i];",
            "        ['title','alt','aria-label'].forEach(function(attr){",
            "          var current = element.getAttribute(attr);",
            "          if(!current) return;",
            "          var next = replaceBrandingText(current);",
            "          if(next !== current) element.setAttribute(attr, next);",
            "        });",
            "      }",
            "    }",
            "  }",
            "  function applyBranding(){",
            "    applyBrandingToNode(document.body);",
            "  }",
            "  function resolveGameByIndex(index){",
            "    if(index === 0) return 'taiwan';",
            "    if(index === 1) return 'macau';",
            "    if(index === 2) return 'hongkong';",
            "    return '';",
            "  }",
            "  function resolveTabIndexByType(type){",
            "    if(type === 2) return 1;",
            "    if(type === 1) return 2;",
            "    return 0;",
            "  }",
            "  function hideShellHeader(){",
            "    if(!(window.__LEGACY_EMBED_CONFIG__ && window.__LEGACY_EMBED_CONFIG__.shellHeader)) return;",
            "    var firstNewsBox = document.querySelector('body > .box.news-box');",
            "    var backTop = document.getElementById('fhdb');",
            "    var firstHero = document.querySelector('body > .box.pad#yxym');",
            "    var nav = document.getElementById('nav2');",
            "    if(firstNewsBox) firstNewsBox.style.display = 'none';",
            "    if(backTop) backTop.style.display = 'none';",
            "    if(firstHero) firstHero.style.display = 'none';",
            "    if(nav) nav.style.display = 'none';",
            "  }",
            "  function postAnchorMap(){",
            "    var anchorIds = ['7x1m','4x8m','gsb','gsb3','msks','9x1m','yqjt','6x','3t','lx'];",
            "    var anchors = {};",
            "    for(var i = 0; i < anchorIds.length; i++){",
            "      var id = anchorIds[i];",
            "      var el = document.getElementById(id);",
            "      if(!el) continue;",
            "      var rect = el.getBoundingClientRect();",
            "      anchors[id] = Math.max(0, Math.round(rect.top + (window.pageYOffset || 0)));",
            "    }",
            "    if(window.parent && window.parent !== window){",
            "      window.parent.postMessage({",
            '        kind: "legacy-anchor-map",',
            "        anchors: anchors,",
            "        href: window.location.href",
            '      }, "*");',
            "    }",
            "  }",
            "  function syncLotteryTabs(){",
            "    var container = document.querySelector('.KJ-TabBox');",
            "    if(!container) return false;",
            "    var tabs = container.querySelectorAll('li');",
            "    var index = resolveTabIndexByType(window.__LEGACY_EMBED_CONFIG__ ? window.__LEGACY_EMBED_CONFIG__.type : 3);",
            "    var target = tabs[index];",
            "    if(!target) { sendDebug('syncLotteryTabs miss target, index=' + index); return false; }",
            "    sendDebug('syncLotteryTabs target index=' + index + ', label=' + (target.textContent || '').trim());",
            "    if(!target.classList.contains('cur') && typeof target.click === 'function'){",
            "      sendDebug('syncLotteryTabs click target');",
            "      target.click();",
            "    }",
            "    return true;",
            "  }",
            "  function getHeight(){",
            "    var body = document.body;",
            "    var html = document.documentElement;",
            "    var scrollTop = window.pageYOffset || (html ? html.scrollTop : 0) || (body ? body.scrollTop : 0) || 0;",
            "    var maxBottom = 0;",
            "    if(body && body.children){",
            "      for(var i = 0; i < body.children.length; i++){",
            "        var child = body.children[i];",
            "        if(!child) continue;",
            "        var childStyle = window.getComputedStyle ? window.getComputedStyle(child) : null;",
            "        if(childStyle && childStyle.position === 'fixed') continue;",
            "        var rect = child.getBoundingClientRect();",
            "        var bottom = rect.bottom + scrollTop;",
            "        if(bottom > maxBottom) maxBottom = bottom;",
            "      }",
            "    }",
            "    return Math.max(0, Math.ceil(maxBottom));",
            "  }",
            "  function postHeight(){",
            "    var height = getHeight();",
            "    if(!height) return;",
            "    if(Math.abs(height - lastHeight) < 2) return;",
            "    lastHeight = height;",
            "    sendDebug('postHeight -> ' + height);",
            "    if(window.parent && window.parent !== window){",
            "      window.parent.postMessage({",
            '        kind: "legacy-embed-height",',
            "        height: height,",
            "        type: window.__LEGACY_EMBED_CONFIG__ ? window.__LEGACY_EMBED_CONFIG__.type : 3,",
            "        href: window.location.href",
            '      }, "*");',
            "    }",
            "  }",
            "  window.addEventListener('load', function(){",
            "    sendDebug('bridge load, type=' + (window.__LEGACY_EMBED_CONFIG__ ? window.__LEGACY_EMBED_CONFIG__.type : 'unknown'));",
            "    hideShellHeader();",
            "    applyBranding();",
            "    syncLotteryTabs();",
            "    postHeight();",
            "    postAnchorMap();",
            "    setTimeout(applyBranding, 80);",
            "    setTimeout(syncLotteryTabs, 80);",
            "    setTimeout(postHeight, 150);",
            "    setTimeout(postAnchorMap, 150);",
            "    setTimeout(applyBranding, 150);",
            "    setTimeout(syncLotteryTabs, 300);",
            "    setTimeout(postHeight, 500);",
            "    setTimeout(postAnchorMap, 500);",
            "    setTimeout(applyBranding, 500);",
            "    setTimeout(postHeight, 1200);",
            "    setTimeout(postAnchorMap, 1200);",
            "    setTimeout(applyBranding, 1200);",
            "  });",
            "  window.addEventListener('resize', postHeight);",
            "  document.addEventListener('click', function(event){",
            "    if(!(window.__LEGACY_EMBED_CONFIG__ && window.__LEGACY_EMBED_CONFIG__.pageSwitch)) return;",
            "    if(event && event.isTrusted === false) return;",
            "    var target = event.target;",
            "    if(!target || !target.closest) return;",
            "    var tabButton = target.closest('.KJ-TabBox > ul > li');",
            "    if(!tabButton) return;",
            "    var container = document.querySelector('.KJ-TabBox');",
            "    if(!container) return;",
            "    var tabs = Array.prototype.slice.call(container.querySelectorAll(':scope > ul > li'));",
            "    var index = tabs.indexOf(tabButton);",
            "    var game = resolveGameByIndex(index);",
            "    sendDebug('click result-tab index=' + index + ', game=' + game);",
            "    if(game) postGameChange(game);",
            "  });",
            "  if(window.ResizeObserver){",
            "    var resizeObserver = new ResizeObserver(postHeight);",
            "    resizeObserver.observe(document.documentElement);",
            "  }",
            "  if(window.MutationObserver && document.body){",
            "    var mutationObserver = new MutationObserver(function(mutations){",
            "      for(var i = 0; i < mutations.length; i++){",
            "        var mutation = mutations[i];",
            "        if(mutation.type === 'characterData' && mutation.target){",
            "          applyBrandingToNode(mutation.target);",
            "        }",
            "        if(mutation.addedNodes){",
            "          for(var j = 0; j < mutation.addedNodes.length; j++){",
            "            applyBrandingToNode(mutation.addedNodes[j]);",
            "          }",
            "        }",
            "      }",
            "      window.requestAnimationFrame(postHeight);",
            "      window.requestAnimationFrame(postAnchorMap);",
            "    });",
            "    mutationObserver.observe(document.body, {",
            "      childList: true,",
            "      subtree: true,",
            "      attributes: true,",
            "      characterData: true",
            "    });",
            "  }",
            "})();",
            "<\/script>",
          ].join("");
        }

        function patchLegacyHtml(html) {
          let patched = html;
          const type = window.__LEGACY_EMBED_CONFIG__?.type || 3;
          const branding = getBrandingByType(type);

          const replacementBootstrap = [
            "<script>",
            "(function(){",
            "  var forumTitle = " + JSON.stringify(branding.forumTitle) + ";",
            "  var dataSite = " + JSON.stringify(branding.dataSite) + ";",
            "  var shortForum = " + JSON.stringify(branding.shortForum) + ";",
            "  function replaceSiteText(input){",
            "    var text = String(input == null ? '' : input);",
            "    return text",
            "      .replace(/\u53f0\u6e7e\u516d\u5408\u5f69\u8bba\u575b/g, forumTitle)",
            "      .replace(/\u53f0\u6e7e\u8d44\u6599\u7f51/g, dataSite)",
            "      .replace(/\u53f0\u6e7e\u8bba\u575b/g, shortForum);",
            "  }",
            "  window.__legacyReplaceSiteText = replaceSiteText;",
            "  var rawWrite = document.write.bind(document);",
            "  var rawWriteln = document.writeln ? document.writeln.bind(document) : null;",
            "  document.write = function(value){ return rawWrite(replaceSiteText(value)); };",
            "  if(rawWriteln){",
            "    document.writeln = function(value){ return rawWriteln(replaceSiteText(value)); };",
            "  }",
            "  var elementProto = window.Element && window.Element.prototype;",
            "  if(elementProto){",
            "    var innerHTMLDescriptor = Object.getOwnPropertyDescriptor(elementProto, 'innerHTML');",
            "    if(innerHTMLDescriptor && innerHTMLDescriptor.get && innerHTMLDescriptor.set){",
            "      Object.defineProperty(elementProto, 'innerHTML', {",
            "        configurable: true,",
            "        enumerable: innerHTMLDescriptor.enumerable,",
            "        get: function(){ return innerHTMLDescriptor.get.call(this); },",
            "        set: function(value){ return innerHTMLDescriptor.set.call(this, replaceSiteText(value)); }",
            "      });",
            "    }",
            "    var rawInsertAdjacentHTML = elementProto.insertAdjacentHTML;",
            "    if(typeof rawInsertAdjacentHTML === 'function'){",
            "      elementProto.insertAdjacentHTML = function(position, html){",
            "        return rawInsertAdjacentHTML.call(this, position, replaceSiteText(html));",
            "      };",
            "    }",
            "  }",
            "})();",
            "<\/script>",
          ].join("");

          patched = patched.replace(
            /var\s+type\s*=\s*3/,
            "var type = window.__LEGACY_EMBED_CONFIG__?.type || 3"
          );
          patched = patched.replace(
            /var\s+web\s*=\s*4/,
            "var web = window.__LEGACY_EMBED_CONFIG__?.web || 4"
          );
          patched = replaceLegacyBranding(patched, branding);
          patched = patched.replace(/<body([^>]*)>/i, `<body$1>${replacementBootstrap}`);
          patched = patched.replace(/<\/body>/i, buildBridgeScript() + "</body>");

          return patched;
        }

        async function loadLegacyPage() {
          try {
            const response = await fetch("./index.html", { cache: "no-store" });
            if (!response.ok) {
              throw new Error("无法读取旧站 index.html");
            }

            const source = await response.text();
            const patched = patchLegacyHtml(source);

            document.open();
            document.write(patched);
            document.close();
          } catch (error) {
            const detail =
              error instanceof Error ? error.message : String(error);
            document.body.innerHTML =
              '<div class="legacy-embed-error">旧站嵌入页加载失败：' +
              detail +
              "</div>";
          }
        }

        window.addEventListener("DOMContentLoaded", loadLegacyPage);
      })();
    </script>
  </head>
  <body>
    <div class="legacy-embed-loading">正在加载旧站模块，请稍候...</div>
  </body>
</html>
