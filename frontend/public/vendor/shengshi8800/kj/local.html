<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no"
  >
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <link rel="icon" href="data:;base64,=">
  <title>开奖结果</title>
  <style type="text/css">
    * { margin: 0; padding: 0; }
    body { background: #fff; }

    .new-KJ-TabBox-box { font-size: 16px; min-height: 150px; box-sizing: border-box; color:#333; padding: 8px 8px 4px; font-family: 'PingFang SC', 'microsoft yahei', arial, 'helvetica neue', 'hiragino sans gb', sans-serif; }
    .new-KJ-TabBox-box a { text-decoration: none; }
    .new-KJ-TabBox-box .kj-font-red { color: #f00 !important; }
    .new-KJ-TabBox-box-tit { display: flex; align-items: center; gap: 8px; min-height: 24px; line-height: 1.4; font-size: 17px; }
    .new-KJ-TabBox-box-tit-l { flex: 1; min-width: 0; }
    .new-KJ-TabBox-box-tit-r { margin-left: auto; display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .beijing-time-badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 1px 9px;
      border: 1px solid #ff7a00;
      border-radius: 4px;
      background: linear-gradient(180deg, #fff8d8 0%, #ffe58f 100%);
      color: #d90000;
      font-size: 15px;
      font-weight: 900;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .7), 0 1px 4px rgba(255, 122, 0, .28);
    }
    .new-KJ-TabBox-box-con { display: flex; margin: 6px 0; }
    .new-KJ-TabBox-box-con .kj-ball { flex: 1; display: flex; align-items: center; justify-content: center; height: 61px; text-align: center; border-radius: 4px; margin-right: 6px; box-sizing: border-box; flex-direction: column; }
    .new-KJ-TabBox-box-con .kj-ball:last-child { margin-right: 0; }
    .new-KJ-TabBox-box-con .kj-ball:nth-last-child(3) { margin-right: 6px; }
    .new-KJ-TabBox-box-con .kj-ball h2 { margin: 0; padding: 0; color: #fff; line-height: 24px; font-size: 28px; font-weight: 900; font-family: Tahoma, Geneva, sans-serif; }
    .new-KJ-TabBox-box-con .kj-ball .whsx { display: inline-block; height: 19px; line-height: 19px; margin-top: 6px; padding: 0 6px; border-radius: 2px; color: #333; font-size: 14px; background: #fff; }
    .new-KJ-TabBox-box-con .kj-add { display: flex; align-items: center; margin-right: 8px; font-size: 32px; font-weight: bold; }
    .new-KJ-TabBox-box-foot { display: flex; align-items: center; gap: 10px; font-size: 16px; }
    .new-KJ-TabBox-box-foot-l { flex: 1; min-width: 0; }
    .new-KJ-TabBox-box-foot-m { color: #666; font-size: 14px; white-space: nowrap; }
    .new-KJ-TabBox-box-foot-r { margin-left: auto; }
    .new-KJ-TabBox-box-foot-r-sx { display: inline-block; min-width: 40px; height: 20px; padding: 0 4px; line-height: 20px; text-align: center; color: #fff; border-radius: 4px; background: #FF9900; }
    .new-KJ-TabBox-box-foot-r-sx.is-loading { opacity: .72; pointer-events: none; }
    .refresh-state { margin-left: 6px; color: #888; font-size: 12px; }
    .refresh-state.is-success { color: #008000; font-weight: 700; }
    .refresh-state.is-error { color: #d90000; font-weight: 700; }
    .new-KJ-TabBox-box.refresh-success { animation: refreshSuccessFlash 900ms ease-out; }
    @keyframes refreshSuccessFlash {
      0% { box-shadow: inset 0 0 0 0 rgba(255, 153, 0, 0); background: #fff; }
      30% { box-shadow: inset 0 0 0 3px rgba(255, 153, 0, .78); background: #fff8d8; }
      100% { box-shadow: inset 0 0 0 0 rgba(255, 153, 0, 0); background: #fff; }
    }
    .ball-red { background: #e71607; }
    .ball-blue { background: #2389e9; }
    .ball-green { background: #1fb61d; }
    .ball-empty { background: #999999; }
    .error-text { color: #b00020; }

    @media screen and (max-width: 650px) {
      .new-KJ-TabBox-box { font-size: 14px; }
      .new-KJ-TabBox-box-tit { font-size: 16px; }
      .beijing-time-badge,
      .new-KJ-TabBox-box-foot-m { font-size: 12px; }
      .new-KJ-TabBox-box-con .kj-ball { margin-right: 4px; }
      .new-KJ-TabBox-box-con .kj-ball:nth-last-child(3) { margin-right: 4px; }
      .new-KJ-TabBox-box-con .kj-ball h2 { font-size: 24px; }
      .new-KJ-TabBox-box-con .kj-ball .whsx { margin-top: 4px; padding: 0 2px; font-size: 12px; }
      .new-KJ-TabBox-box-con .kj-add { margin-right: 4px; font-size: 24px; }
      .new-KJ-TabBox-box-foot { font-size: 15px; }
    }

    @media screen and (max-width:450px) {
      .new-KJ-TabBox-box-tit { align-items: flex-start; flex-wrap: wrap; }
      .new-KJ-TabBox-box-tit-r { width: 100%; justify-content: space-between; }
      .new-KJ-TabBox-box-foot { flex-wrap: wrap; }
      .new-KJ-TabBox-box-foot-m { width: 100%; order: 3; white-space: normal; }
    }
  </style>
</head>
<body onselectstart="javascript:return(false);" oncontextmenu="javascript:return(false);">
  <textarea readonly id="shareInfo" name="shareInfo" style="position:absolute;top:-9999px;"></textarea>

  <div class="new-KJ-TabBox-box">
    <div class="new-KJ-TabBox-box-tit">
      <div class="new-KJ-TabBox-box-tit-l">
        <span id="lotteryLabel">台湾彩</span> 第<font class="kj-font-red"><span id="q">--</span></font>期
      </div>
      <div class="new-KJ-TabBox-box-tit-r">
        <span id="countdownBadge" class="beijing-time-badge">下次开奖 --:--:--</span>
        <a id="historyLink" target="_blank" href="/history?type=3" class="kj-font-red">查看历史记录</a>
      </div>
    </div>
    <div class="new-KJ-TabBox-box-con">
      <div id="w1" class="kj-ball box ball-empty"><h2><div id="m1">--</div></h2><div id="m1x" class="whsx">--</div></div>
      <div id="w2" class="kj-ball box ball-empty"><h2><div id="m2">--</div></h2><div id="m2x" class="whsx">--</div></div>
      <div id="w3" class="kj-ball box ball-empty"><h2><div id="m3">--</div></h2><div id="m3x" class="whsx">--</div></div>
      <div id="w4" class="kj-ball box ball-empty"><h2><div id="m4">--</div></h2><div id="m4x" class="whsx">--</div></div>
      <div id="w5" class="kj-ball box ball-empty"><h2><div id="m5">--</div></h2><div id="m5x" class="whsx">--</div></div>
      <div id="w6" class="kj-ball box ball-empty"><h2><div id="m6">--</div></h2><div id="m6x" class="whsx">--</div></div>
      <div class="kj-add">+</div>
      <div id="w7" class="kj-ball box ball-empty"><h2><div id="s1">--</div></h2><div id="s1x" class="whsx">--</div></div>
    </div>
    <div class="new-KJ-TabBox-box-foot">
      <div id="statusText" class="new-KJ-TabBox-box-foot-l">
        当前期号：<font class="kj-font-red"><span id="currentIssue">--</span></font>
      </div>
      <div id="beijingDate" class="new-KJ-TabBox-box-foot-m">星期-- ----/--/--</div>
      <div class="new-KJ-TabBox-box-foot-r">
        <a id="refreshButton" class="new-KJ-TabBox-box-foot-r-sx" style="cursor:pointer;">刷新</a>
        <span id="refreshState" class="refresh-state"></span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var lotteryType = Number(params.get("lottery_type") || "3");
      var label = params.get("label") || "";
      var labelMap = { 1: "香港彩", 2: "澳门彩", 3: "台湾彩" };
      var ballPrefixIds = ["m1", "m2", "m3", "m4", "m5", "m6", "s1"];
      var zodiacPrefixIds = ["m1x", "m2x", "m3x", "m4x", "m5x", "m6x", "s1x"];
      var ballWrapIds = ["w1", "w2", "w3", "w4", "w5", "w6", "w7"];
      var beijingDateFormatter = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        weekday: "long"
      });
      var beijingTimeFormatter = new Intl.DateTimeFormat("zh-CN", {
        timeZone: "Asia/Shanghai",
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      function $(id) {
        return document.getElementById(id);
      }

      function updateHistoryLink() {
        var historyLink = $("historyLink");
        if (historyLink) {
          historyLink.href = "/history?type=" + encodeURIComponent(String(lotteryType));
        }
      }

      function pad2(value) {
        var text = String(value || "");
        return text.length >= 2 ? text : "0" + text;
      }

      function setBall(index, ball) {
        var valueNode = $(ballPrefixIds[index]);
        var zodiacNode = $(zodiacPrefixIds[index]);
        var wrapNode = $(ballWrapIds[index]);
        if (!valueNode || !zodiacNode || !wrapNode) return;

        var color = ball && typeof ball.color === "string" ? ball.color : "";
        wrapNode.className = "kj-ball box " + (color ? "ball-" + color : "ball-empty");
        valueNode.textContent = ball && ball.value ? pad2(ball.value) : "--";
        zodiacNode.textContent = ball && ball.zodiac ? String(ball.zodiac) : "--";
      }

      function fillEmpty() {
        for (var i = 0; i < 7; i++) {
          setBall(i, null);
        }
      }

      function formatBeijingTime(date) {
        return beijingTimeFormatter.format(date || new Date());
      }

      /* ── 倒计时（next_time 支持秒/毫秒，server_time 可选）── */
      var countdownDeadline = 0;
      var serverOffsetSec = 0;
      var countdownTimerId = null;
      var countdownExpired = false;

      /** 规范化时间戳：>10 位视为毫秒 → 转为秒 */
      function normalizeToSeconds(raw) {
        return raw > 9999999999 ? Math.floor(raw / 1000) : raw;
      }

      function formatCountdown(remainingMs) {
        if (remainingMs <= 0) return "00:00:00";
        var totalSec = Math.floor(remainingMs / 1000);
        var h = Math.floor(totalSec / 3600);
        var m = Math.floor((totalSec % 3600) / 60);
        var s = totalSec % 60;
        return (h < 10 ? "0" + h : "" + h) + ":" +
               (m < 10 ? "0" + m : "" + m) + ":" +
               (s < 10 ? "0" + s : "" + s);
      }

      function updateCountdownDisplay() {
        var badge = $("countdownBadge");
        if (!badge) return;
        if (countdownDeadline > 0) {
          var serverNow = Math.floor(Date.now() / 1000) + serverOffsetSec;
          var remainingSec = countdownDeadline - serverNow;
          var remaining = remainingSec * 1000;
          if (remaining <= 0) {
            badge.textContent = "下次开奖 00:00:00";
            badge.style.borderColor = "#e53e3e";
            if (!countdownExpired) {
              countdownExpired = true;
              load({ manual: false });
            }
          } else {
            countdownExpired = false;
            badge.textContent = "下次开奖 " + formatCountdown(remaining);
            badge.style.borderColor = "#ff7a00";
          }
        } else {
          badge.textContent = "下次开奖 --:--:--";
        }
      }

      async function fetchCountdownDeadline() {
        try {
          var resp = await fetch("/api/next-draw-deadline?lottery_type=" + encodeURIComponent(String(lotteryType)), { cache: "no-store" });
          var data = await resp.json();
          if (data && data.next_time) {
            countdownDeadline = normalizeToSeconds(Number(data.next_time));
            if (data.server_time) {
              var clientSec = Math.floor(Date.now() / 1000);
              serverOffsetSec = Number(data.server_time) - clientSec;
            } else {
              serverOffsetSec = 0;
            }
            countdownExpired = false;
          } else {
            countdownDeadline = 0;
            serverOffsetSec = 0;
          }
        } catch (e) {
          countdownDeadline = 0;
          serverOffsetSec = 0;
        }
        updateCountdownDisplay();
      }

      function startCountdown() {
        stopCountdown();
        fetchCountdownDeadline().then(function () {
          countdownTimerId = setInterval(function () {
            updateCountdownDisplay();
          }, 1000);
        });
      }

      function stopCountdown() {
        if (countdownTimerId) {
          clearInterval(countdownTimerId);
          countdownTimerId = null;
        }
      }

      /* ── 北京时间 星期 + 日期 ── */
      function updateBeijingDate() {
        var dateNode = $("beijingDate");
        if (!dateNode) return;
        var now = new Date();
        var dateParts = beijingDateFormatter.formatToParts(now);
        var weekday = "";
        var year = "";
        var month = "";
        var day = "";
        for (var i = 0; i < dateParts.length; i++) {
          var part = dateParts[i];
          if (part.type === "weekday") weekday = part.value;
          if (part.type === "year") year = part.value;
          if (part.type === "month") month = part.value;
          if (part.type === "day") day = part.value;
        }
        dateNode.textContent = weekday + " " + year + "/" + month + "/" + day;
      }

      function setRefreshState(state, text) {
        var refreshButton = $("refreshButton");
        var refreshState = $("refreshState");
        var resultBox = document.querySelector(".new-KJ-TabBox-box");
        if (!refreshButton) return;

        if (state === "loading") {
          refreshButton.classList.add("is-loading");
          refreshButton.textContent = "刷新中";
          refreshButton.setAttribute("aria-busy", "true");
        } else {
          refreshButton.classList.remove("is-loading");
          refreshButton.textContent = "刷新";
          refreshButton.removeAttribute("aria-busy");
        }

        if (refreshState) {
          refreshState.className = "refresh-state";
          if (state === "done") refreshState.classList.add("is-success");
          if (state === "error") refreshState.classList.add("is-error");
          refreshState.textContent = text || "";
        }

        if (state === "done" && resultBox) {
          resultBox.classList.remove("refresh-success");
          void resultBox.offsetWidth;
          resultBox.classList.add("refresh-success");
        }
      }

      function render(payload) {
        var issue = payload && payload.current_issue ? String(payload.current_issue) : "";
        var year = issue.length > 4 ? issue.slice(0, 4) : "";
        var term = issue.length > 4 ? issue.slice(4) : issue;
        var balls = [];

        if (payload && Array.isArray(payload.result_balls)) {
          balls = payload.result_balls.slice(0, 6);
        }
        if (payload && payload.special_ball) {
          balls.push(payload.special_ball);
        }

        while (balls.length < 7) {
          balls.push(null);
        }

        $("lotteryLabel").textContent = label || labelMap[lotteryType] || labelMap[3];
        $("q").textContent = term || "--";
        $("currentIssue").textContent = issue || "--";
        updateHistoryLink();

        var statusText = $("statusText");
        if (statusText) {
          var suffix = year ? "（" + year + "年）" : "";
          statusText.innerHTML = '当前期号：<font class="kj-font-red"><span id="currentIssue">' +
            (issue || "--") +
            "</span></font>" +
            suffix;
        }

        for (var i = 0; i < 7; i++) {
          setBall(i, balls[i]);
        }
      }

      function showError(message) {
        fillEmpty();
        $("q").textContent = "--";
        var statusText = $("statusText");
        if (statusText) {
          statusText.innerHTML = '<span class="error-text">开奖结果加载失败：' + String(message || "未知错误") + "</span>";
        }
      }

      async function load(options) {
        var isManual = options && options.manual;
        if (isManual) {
          setRefreshState("loading", "");
        }

        try {
          var query = new URLSearchParams({
            lottery_type: String(lotteryType),
            _ts: String(Date.now())
          });
          var response = await fetch("/api/latest-draw?" + query.toString(), {
            cache: "no-store"
          });
          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }
          var payload = await response.json();
          render(payload || {});
          if (isManual) {
            setRefreshState("done", "已刷新 " + formatBeijingTime(new Date()));
          }
        } catch (error) {
          showError(error && error.message ? error.message : String(error));
          if (isManual) {
            setRefreshState("error", "刷新失败");
          }
        }
      }

      $("refreshButton").addEventListener("click", function () {
        if ($("refreshButton").classList.contains("is-loading")) return;
        load({ manual: true });
      });

      fillEmpty();
      updateHistoryLink();
      updateBeijingDate();
      setInterval(updateBeijingDate, 1000);
      startCountdown();
      load();
    })();
  </script>
</body>
</html>
