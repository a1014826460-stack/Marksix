    // === 全局彩种状态初始化（必须在所有业务脚本之前执行）===
    (function() {
        var savedKey = localStorage.getItem('selectedLottery');
        if (!savedKey || !window.LOTTERY_CONFIGS[savedKey]) {
            savedKey = window.DEFAULT_LOTTERY_KEY;
        }
        var config = window.LOTTERY_CONFIGS[savedKey];

        window.appState = {
            lotteryKey: savedKey,
            httpApi: config.apiBase,
            web: config.web,
            type: config.type
        };

        // 兼容旧业务 JS：它们直接读取全局变量 httpApi / web / type
        window.httpApi = config.apiBase;
        window.web = config.web;
        window.type = config.type;
    })();
</script>

    <script>
        // === 保存初始内容区的 HTML，用于切换彩种时重置 ===
        var __initialContentHTML = '';

        // === 彩种切换核心函数 ===
        function switchLottery(lotteryKey) {
            var config = window.LOTTERY_CONFIGS[lotteryKey];
            if (!config) {
                console.error('Unknown lottery key:', lotteryKey);
                return;
            }

            // 相同彩种不重复切换
            if (window.appState && window.appState.lotteryKey === lotteryKey) {
                return;
            }

            // 更新全局状态
            window.appState = {
                lotteryKey: lotteryKey,
                httpApi: config.apiBase,
                web: config.web,
                type: config.type
            };

            // 同步全局变量，兼容旧业务 JS
            window.httpApi = config.apiBase;
            window.web = config.web;
            window.type = config.type;

            // 持久化选择
            localStorage.setItem('selectedLottery', lotteryKey);

            // 更新 UI
            updateLotteryTabs(lotteryKey);
            // 同步开奖 iframe
            if (typeof window.updateKjIframe === 'function') {
                window.updateKjIframe(lotteryKey);
            }
            // 重新加载所有预测资料模块
            reloadContentArea();
        }

        // === 更新 Tab 按钮高亮 ===
        function updateLotteryTabs(lotteryKey) {
            var buttons = document.querySelectorAll('.lottery-tab-btn');
            buttons.forEach(function(btn) {
                if (btn.getAttribute('data-lottery') === lotteryKey) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // === 重新加载内容区域 ===
        function reloadContentArea() {
            var container = document.getElementById('content-area');
            if (!container) return;
            if (!__initialContentHTML) return;

            // 临时替换 document.write 防止意外覆盖整个页面
            var _origWrite = document.write;
            document.write = function(html) {
                console.warn('document.write blocked after page load');
            };

            try {
                // 重置为初始 HTML
                container.innerHTML = __initialContentHTML;

                // 重新执行所有 script 标签
                var scripts = container.querySelectorAll('script');
                scripts.forEach(function(oldScript) {
                    var newScript = document.createElement('script');

                    // 复制属性
                    for (var ai = 0; ai < oldScript.attributes.length; ai++) {
                        var attr = oldScript.attributes[ai];
                        newScript.setAttribute(attr.name, attr.value);
                    }

                    // 复制内联脚本内容
                    if (!oldScript.src && oldScript.textContent) {
                        newScript.textContent = oldScript.textContent;
                    }

                    // 替换旧节点
                    if (oldScript.parentNode) {
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    }
                });
            } finally {
                document.write = _origWrite;
            }
        }

        // === 页面初始化 ===
        (function initLotteryTabs() {
            // 1. 初始 Tab 高亮
            var currentKey = window.appState && window.appState.lotteryKey;
            if (currentKey) {
                updateLotteryTabs(currentKey);
            }

            // 2. 捕获初始内容 HTML（在 AJAX 回调修改 DOM 之前）
            var container = document.getElementById('content-area');
            if (container) {
                __initialContentHTML = container.innerHTML;
            }

            // 3. 如果缓存的彩种与默认不同，触发切换
            var savedKey = localStorage.getItem('selectedLottery');
            if (savedKey && savedKey !== window.DEFAULT_LOTTERY_KEY && window.LOTTERY_CONFIGS[savedKey]) {
                // 设置为临时值以确保 switchLottery 会执行
                var tmpKey = window.appState.lotteryKey;
                window.appState.lotteryKey = '';
                switchLottery(savedKey);
                window.appState.lotteryKey = savedKey;
            }
        })();
    </script>

                    if (btn) {

        })();
