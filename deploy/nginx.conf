# ============================================================
# Nginx 反向代理配置 - 六合彩彩票数据管理系统
# 部署路径：/etc/nginx/conf.d/liuhecai.conf
# ============================================================

upstream python_api {
    server python-api:8000;
}

upstream backend_admin {
    server backend-admin:3002;
}

upstream frontend_web {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;  # 替换为实际域名，如 marksix.example.com

    client_max_body_size 100m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ---- 前端 Next.js API 代理（浏览器端调用 → 前端 BFF 层 → Python API） ----
    location /api/ {
        proxy_pass http://frontend_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Next.js 后端管理界面 ----
    location /admin {
        proxy_pass http://backend_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Next.js 前端站点（默认入口） ----
    location / {
        proxy_pass http://frontend_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- 静态资源直连（彩票图片等） ----
    # 如果图片存储在 API 服务上
    location /uploads/ {
        proxy_pass http://python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- 监控端点 ----
    location /health {
        access_log off;
        return 200 "OK\n";
    }
}