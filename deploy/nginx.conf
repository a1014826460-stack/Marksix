# ============================================================
# Default Nginx reverse proxy config
# - HTTP only
# - Works with server IP out of the box
# - HTTPS/domain binding is configured separately
# ============================================================

server {
    listen 80 default_server;
    server_name _;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 100m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ---- Real health check: proxy to Python API ----
    location /health {
        proxy_pass http://python-api:8000/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ---- Frontend Next.js API proxy ----
    # 所有 /api/* 请求代理到 Next.js 前端，由其兼容层分发：
    #   /api/kaijiang/*      → app/api/kaijiang/[...path]/route.ts  (预测资料)
    #   /api/index/notice    → app/api/index/notice/route.ts         (公告弹窗)
    #   /api/post/getList    → app/api/post/getList/route.ts         (推荐列表)
    #   /api/latest-draw     → app/api/latest-draw/route.ts          (最新开奖)
    #   /api/lottery-data    → app/api/lottery-data/route.ts         (站点首页)
    #   /api/predict/*       → app/api/predict/[mechanism]/route.ts  (执行预测)
    #   /api/draw-history    → app/api/draw-history/route.ts         (历史开奖)
    #   /api/next-draw-deadline → app/api/next-draw-deadline/route.ts (下期截止)
    #
    # Next.js 兼容层再代理到 Python 后端 (端口 8000)：
    #   /api/legacy/module-rows  → Python 查询 mode_payload_* 表
    #   /api/public/notice       → Python 读取 managed_sites.announcement
    location /api/ {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Next.js admin interface ----
    location = /fackyou {
        proxy_pass http://backend-admin:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /fackyou/ {
        proxy_pass http://backend-admin:3002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Static assets ----
    location /uploads/ {
        proxy_pass http://python-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
