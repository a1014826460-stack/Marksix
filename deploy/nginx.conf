# ============================================================
# Nginx 反向代理配置 - 六合彩彩票数据管理系统
# 部署路径：/etc/nginx/conf.d/default.conf（通过 Docker volume 挂载）
# ============================================================
#
# 使用 Docker 内置 DNS (127.0.0.11) 进行运行时解析，
# 避免容器重启后 IP 变化导致 502 Bad Gateway。
#
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    client_max_body_size 100m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # ---- 真实健康检查：代理到 Python API ----
    location /health {
        set $python_api python-api:8000;
        proxy_pass http://$python_api/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ---- 前端 Next.js API 代理（浏览器端调用 → 前端 BFF 层 → Python API） ----
    location /api/ {
        set $frontend_web frontend:3000;
        proxy_pass http://$frontend_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Next.js 后端管理界面 ----
    location /admin {
        set $backend_admin backend-admin:3002;
        proxy_pass http://$backend_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Next.js 前端站点（默认入口） ----
    location / {
        set $frontend_web frontend:3000;
        proxy_pass http://$frontend_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- 静态资源直连（彩票图片等） ----
    location /uploads/ {
        set $python_api python-api:8000;
        proxy_pass http://$python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
