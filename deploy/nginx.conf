# ============================================================
# Nginx reverse proxy config for shengshi8800.com
# - http://shengshi8800.com      -> https://www.shengshi8800.com
# - http://www.shengshi8800.com  -> https://www.shengshi8800.com
# - https://shengshi8800.com     -> https://www.shengshi8800.com
# - https://www.shengshi8800.com/ -> /legacy-shell?t=3
# ============================================================

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name shengshi8800.com;
    return 301 https://www.shengshi8800.com$request_uri;
}

server {
    listen 80;
    server_name www.shengshi8800.com;
    return 301 https://www.shengshi8800.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name shengshi8800.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://www.shengshi8800.com$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.shengshi8800.com;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Enable after HTTPS has been verified in production.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 100m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location = / {
        return 302 /legacy-shell?t=3;
    }

    location /health {
        set $python_api python-api:8000;
        proxy_pass http://$python_api/api/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /api/ {
        set $frontend_web frontend:3000;
        proxy_pass http://$frontend_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
        set $backend_admin backend-admin:3002;
        proxy_pass http://$backend_admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        set $frontend_web frontend:3000;
        proxy_pass http://$frontend_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        set $python_api python-api:8000;
        proxy_pass http://$python_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
