# ============================================================
# 六合彩彩票数据管理系统 - Docker Compose
# 适用于 Ubuntu 24.04 LTS 部署
# ============================================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16
    container_name: liuhecai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: liuhecai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/data:/data:ro  # 只读挂载，用于数据迁移
    ports:
      - "127.0.0.1:5432:5432"  # 仅本地访问
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d liuhecai"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - liuhecai-network

  # Python API 服务（核心后端）
  python-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: liuhecai-python-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LOTTERY_DB_PATH: "postgresql://postgres:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/liuhecai"
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-change_me_in_production}@postgres:5432/liuhecai"
      LOTTERY_API_HOST: "0.0.0.0"
      LOTTERY_API_PORT: "8000"
    ports:
      - "127.0.0.1:8000:8000"  # 仅本地访问，通过 Nginx 代理
    volumes:
      - ./backend/data:/app/data  # SQLite 数据和图片
      - ./backend/src/config.yaml:/app/config.yaml:ro  # 配置文件
    networks:
      - liuhecai-network

  # Next.js 后端管理界面 (port 3002)
  backend-admin:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: liuhecai-backend-admin
    restart: unless-stopped
    depends_on:
      - python-api
    environment:
      PYTHON_API_BASE_URL: "http://python-api:8000"
      NODE_ENV: production
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - liuhecai-network

  # Next.js 前端站点 (port 3000)
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: liuhecai-frontend
    restart: unless-stopped
    depends_on:
      - python-api
    environment:
      LOTTERY_BACKEND_BASE_URL: "http://python-api:8000/api"
      LOTTERY_SITE_ID: "${LOTTERY_SITE_ID:-1}"
      NODE_ENV: production
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - liuhecai-network

  # Nginx 反向代理（统一入口）
  nginx:
    image: nginx:1.27-alpine
    container_name: liuhecai-nginx
    restart: unless-stopped
    depends_on:
      - python-api
      - backend-admin
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro  # SSL 证书目录（可选）
    networks:
      - liuhecai-network

volumes:
  postgres_data:
    driver: local

networks:
  liuhecai-network:
    driver: bridge